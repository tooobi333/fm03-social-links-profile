<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

        <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
        <link rel="stylesheet" href="styles/home.css">

        <title>Frontend Mentor | Social links profile</title>
    </head>
    <body>
        <div class="container-main">
            <img class="image-avatar">
            <div class="container-text-info">
                <p class="text-name">Jessica Randall</p>
                <p class="text-location">London, United Kingdom</p>
                <p class="text-occupation">"Front-end developer and avid reader."</p>
            </div>
            <div class="container-buttons">
                <button class="button-general">GitHub</button>
                <button class="button-general">Frontend Mentor</button>
                <button class="button-general">LinkedIn</button>
                <button class="button-general">Twitter</button>
                <button class="button-general">Instagram</button>
            </div>
        </div>
        <div class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
