<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

        <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
        <link rel="stylesheet" href="styles/home.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <title>Frontend Mentor | Social links profile</title>
    </head>
    <body>
        <div class="container-main">
            <img class="image-avatar" src="assets/images/avatar-jessica.jpeg" alt="Picture of Jessica Randall">
            <div class="container-text-info">
                <p class="text-name">Jessica Randall</p>
                <p class="text-location">London, United Kingdom</p>
                <p class="text-occupation">"Front-end developer and avid reader."</p>
            </div>
            <div class="container-buttons">
                <button class="button-general">GitHub</button>
                <button class="button-general">Frontend Mentor</button>
                <button class="button-general">LinkedIn</button>
                <button class="button-general">Twitter</button>
                <button class="button-general">Instagram</button>
            </div>
        </div>
        <div class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
            Coded by <a href="#">Your Name Here</a>.
        </div>
    </body>
</html>
